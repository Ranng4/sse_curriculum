openapi: 3.0.3
info:
  title: Stock Fund Forum API
  version: 1.0.0
  description: 课程设计股票基金投资论坛后端接口（模板）
servers:
  - url: http://127.0.0.1:8000
tags:
  - name: Auth
  - name: Profile
  - name: Suitability
  - name: Forum
  - name: Content
  - name: Social
paths:
  /healthz:
    get:
      summary: 健康检查
      responses:
        "200":
          description: OK
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: 注册
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/RegisterByPhoneRequest"
                - $ref: "#/components/schemas/RegisterByEmailRequest"
                - $ref: "#/components/schemas/RegisterByThirdPartyRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: 登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
  /api/v1/forum/sections:
    get:
      tags: [Forum]
      summary: 获取板块分区
      responses:
        "200":
          description: OK
  /api/v1/forum/boards:
    get:
      tags: [Forum]
      summary: 板块列表
      parameters:
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: market
          schema:
            type: string
        - in: query
          name: active_only
          schema:
            type: boolean
      responses:
        "200":
          description: OK
    post:
      tags: [Forum]
      summary: 创建板块
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForumBoardCreateRequest"
      responses:
        "201":
          description: Created
  /api/v1/profile/me:
    get:
      tags: [Profile]
      summary: 获取我的资料
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
  /api/v1/profile/basic:
    patch:
      tags: [Profile]
      summary: 更新基础资料
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBasicProfileRequest"
      responses:
        "200":
          description: OK
  /api/v1/suitability/questionnaire:
    get:
      tags: [Suitability]
      summary: 获取风险问卷
      responses:
        "200":
          description: OK
  /api/v1/suitability/submit:
    post:
      tags: [Suitability]
      summary: 提交风险问卷
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitSuitabilityRequest"
      responses:
        "200":
          description: OK
  /api/v1/content/posts:
    get:
      tags: [Content]
      summary: 帖子列表
      parameters:
        - in: query
          name: board_id
          schema:
            type: string
        - in: query
          name: keyword
          schema:
            type: string
        - in: query
          name: stock_code
          schema:
            type: string
        - in: query
          name: sort
          schema:
            type: string
            enum: [latest, hot]
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: OK
    post:
      tags: [Content]
      summary: 发布帖子
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostCreateRequest"
      responses:
        "201":
          description: Created
  /api/v1/content/posts/{post_id}:
    get:
      tags: [Content]
      summary: 帖子详情
      parameters:
        - in: path
          name: post_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
    patch:
      tags: [Content]
      summary: 更新帖子
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: post_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostUpdateRequest"
      responses:
        "200":
          description: OK
  /api/v1/content/posts/{post_id}/comments:
    get:
      tags: [Content]
      summary: 评论列表
      parameters:
        - in: path
          name: post_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
    post:
      tags: [Content]
      summary: 发表评论
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: post_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentCreateRequest"
      responses:
        "201":
          description: Created
  /api/v1/content/posts/{post_id}/like:
    post:
      tags: [Content]
      summary: 点赞
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: post_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
    delete:
      tags: [Content]
      summary: 取消点赞
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: post_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
  /api/v1/content/posts/{post_id}/favorite:
    post:
      tags: [Content]
      summary: 收藏
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: post_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
    delete:
      tags: [Content]
      summary: 取消收藏
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: post_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
  /api/v1/content/feed:
    get:
      tags: [Content]
      summary: 首页信息流
      parameters:
        - in: query
          name: following_only
          schema:
            type: boolean
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: OK
  /api/v1/content/hot-rank:
    get:
      tags: [Content]
      summary: 热榜
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: OK
  /api/v1/content/search/suggest:
    get:
      tags: [Content]
      summary: 搜索联想
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: OK
  /api/v1/social/follows/{target_user_id}:
    post:
      tags: [Social]
      summary: 关注用户
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: target_user_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
    delete:
      tags: [Social]
      summary: 取消关注
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: target_user_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
  /api/v1/social/follows/me:
    get:
      tags: [Social]
      summary: 我的关注列表
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
  /api/v1/social/fans/me:
    get:
      tags: [Social]
      summary: 我的粉丝列表
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
  /api/v1/social/stats/me:
    get:
      tags: [Social]
      summary: 我的关注统计
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApiSuccess:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        data: {}
    RegisterByPhoneRequest:
      type: object
      required: [method, phone, password, nickname, verification_code]
      properties:
        method:
          type: string
          enum: [phone]
        phone:
          type: string
        password:
          type: string
        nickname:
          type: string
        verification_code:
          type: string
    RegisterByEmailRequest:
      type: object
      required: [method, email, password, nickname, verification_code]
      properties:
        method:
          type: string
          enum: [email]
        email:
          type: string
        password:
          type: string
        nickname:
          type: string
        verification_code:
          type: string
    RegisterByThirdPartyRequest:
      type: object
      required: [method, access_token, nickname]
      properties:
        method:
          type: string
          enum: [wechat, weibo]
        access_token:
          type: string
        nickname:
          type: string
    LoginRequest:
      type: object
      required: [account, password]
      properties:
        account:
          type: string
        password:
          type: string
    ForumBoardCreateRequest:
      type: object
      required: [slug, name, category]
      properties:
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [market, topic, company_research, qa]
        market:
          type: string
        parent_id:
          type: string
        sort_order:
          type: integer
        is_active:
          type: boolean
    UpdateBasicProfileRequest:
      type: object
      properties:
        nickname:
          type: string
        avatar_url:
          type: string
        bio:
          type: string
        experience_tags:
          type: array
          items:
            type: string
    SubmitSuitabilityRequest:
      type: object
      required: [answers]
      properties:
        answers:
          type: object
          additionalProperties:
            type: integer
    PostCreateRequest:
      type: object
      required: [board_id, title, content]
      properties:
        board_id:
          type: string
        title:
          type: string
        content:
          type: string
        post_type:
          type: string
          enum: [normal, longform, realtime]
        stock_codes:
          type: array
          items:
            type: string
        image_urls:
          type: array
          items:
            type: string
    PostUpdateRequest:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        post_type:
          type: string
          enum: [normal, longform, realtime]
        stock_codes:
          type: array
          items:
            type: string
        image_urls:
          type: array
          items:
            type: string
    CommentCreateRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
        parent_comment_id:
          type: string
